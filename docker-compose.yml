services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/readers_quest.db
      - ADMIN_PIN=1234
    restart: unless-stopped

  dev:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_PATH=/app/data/readers_quest.db
      - ADMIN_PIN=1234
    command: flask run --host=0.0.0.0 --port=5000 --reload
    profiles:
      - dev

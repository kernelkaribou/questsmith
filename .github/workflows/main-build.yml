name: Main Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: false
          tags: questsmith:v${{ steps.version.outputs.version }},questsmith:latest
          outputs: type=oci,dest=/tmp/questsmith.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: questsmith-v${{ steps.version.outputs.version }}
          path: /tmp/questsmith.tar

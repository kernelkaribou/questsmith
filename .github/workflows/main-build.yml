name: Main Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: readers-quest:v${{ steps.version.outputs.version }},readers-quest:latest
          outputs: type=docker,dest=/tmp/readers-quest.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: readers-quest-v${{ steps.version.outputs.version }}
          path: /tmp/readers-quest.tar

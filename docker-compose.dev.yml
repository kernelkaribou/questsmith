services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_PATH=/app/data/questsmith.db
      - ADMIN_PIN=1234
      - SECRET_KEY=dev-secret-key-do-not-use-in-production
    command: >
      sh -c "tailwindcss -i ./app/static/css/input.css -o ./app/static/css/style.css &&
      { tailwindcss -i ./app/static/css/input.css -o ./app/static/css/style.css --watch=always &
      exec gunicorn --bind 0.0.0.0:5000 --workers 2 --threads 4 --worker-class gthread --timeout 30 --reload 'app:create_app()'; }"

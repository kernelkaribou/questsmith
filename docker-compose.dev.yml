services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - FLASK_APP=app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_PATH=/app/data/questsmith.db
      - ADMIN_PIN=1234
    command: >
      sh -c "tailwindcss -i ./app/static/css/input.css -o ./app/static/css/style.css &&
      { tailwindcss -i ./app/static/css/input.css -o ./app/static/css/style.css --watch=always &
      exec flask run --host=0.0.0.0 --port=5000 --reload; }"

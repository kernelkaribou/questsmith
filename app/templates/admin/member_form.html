{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if member else 'Add' }} Member{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-white mb-6">{{ 'Edit' if member else 'Add' }} Member</h1>

<form method="POST" enctype="multipart/form-data" class="bg-slate-800/50 border border-white/10 rounded-lg p-6 max-w-md">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Name</label>
        <input type="text" name="name" value="{{ member.name if member else '' }}" required
               class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Profile Picture</label>
        {% if member and member.avatar_url %}
        <div class="mb-2 flex items-center gap-3">
            <img src="{{ url_for('admin.serve_upload', filepath=member.avatar_url[8:]) if member.avatar_url.startswith('uploads/') else member.avatar_url }}" alt="{{ member.name }}" class="w-12 h-12 rounded-full object-cover">
            <span class="text-xs text-white/60">Current picture</span>
        </div>
        {% endif %}
        <input type="file" name="avatar_file" accept="image/*"
               class="w-full text-sm text-white/60 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-amber-500/20 file:text-amber-300 hover:file:bg-amber-500/30">
        <input type="hidden" name="avatar_url" value="{{ member.avatar_url or '' if member else '' }}">
    </div>
    <button type="submit" class="bg-amber-500 text-slate-900 px-4 py-2 rounded hover:bg-amber-400 transition-colors font-medium">
        {{ 'Save Changes' if member else 'Add Member' }}
    </button>
    <a href="{{ url_for('admin.members') }}" class="ml-3 text-white/50 hover:text-white/80 text-sm transition-colors">Cancel</a>
</form>
{% endblock %}

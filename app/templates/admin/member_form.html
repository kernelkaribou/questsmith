{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if member else 'Add' }} Member{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ 'Edit' if member else 'Add' }} Member</h1>

<form method="POST" enctype="multipart/form-data" class="bg-white rounded-lg shadow p-6 max-w-md">
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" name="name" value="{{ member.name if member else '' }}" required
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Profile Picture</label>
        {% if member and member.avatar_url %}
        <div class="mb-2 flex items-center gap-3">
            <img src="{{ url_for('admin.serve_upload', filepath=member.avatar_url[8:]) if member.avatar_url.startswith('uploads/') else member.avatar_url }}" alt="{{ member.name }}" class="w-12 h-12 rounded-full object-cover">
            <span class="text-xs text-gray-500">Current picture</span>
        </div>
        {% endif %}
        <input type="file" name="avatar_file" accept="image/*"
               class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
        <p class="text-xs text-gray-400 mt-1">Or provide a URL:</p>
        <input type="url" name="avatar_url" value="{{ member.avatar_url or '' }}" placeholder="https://..."
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 mt-1">
    </div>
    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
        {{ 'Save Changes' if member else 'Add Member' }}
    </button>
    <a href="{{ url_for('admin.members') }}" class="ml-3 text-gray-600 hover:underline text-sm">Cancel</a>
</form>
{% endblock %}

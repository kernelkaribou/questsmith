{% extends "admin/base.html" %}
{% block title %}{{ 'Edit' if achievement else 'New' }} Achievement{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ 'Edit' if achievement else 'New' }} Achievement</h1>

<form method="POST" class="bg-white rounded-lg shadow p-6 max-w-lg" x-data="{ triggerType: '{{ achievement.trigger_type if achievement else 'manual' }}' }">
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" name="name" value="{{ achievement.name if achievement else '' }}" required
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea name="description" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ achievement.description or '' if achievement else '' }}</textarea>
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Icon (emoji or URL)</label>
        <input type="text" name="icon" value="{{ achievement.icon or '' if achievement else '' }}"
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Trigger Type</label>
        <select name="trigger_type" x-model="triggerType"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="manual">Manual (Admin awards)</option>
            <option value="auto">Auto (triggers on lifetime stat)</option>
        </select>
    </div>
    <div x-show="triggerType === 'auto'" class="mb-4 p-3 bg-gray-50 rounded-md">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Metric</label>
                <input type="text" name="trigger_metric"
                       value="{{ achievement.trigger_condition.metric if achievement and achievement.trigger_condition else '' }}"
                       placeholder="e.g. total_currency_earned"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Threshold</label>
                <input type="number" name="trigger_threshold" min="1"
                       value="{{ achievement.trigger_condition.threshold if achievement and achievement.trigger_condition else '' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>
    </div>

    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
        {{ 'Save Changes' if achievement else 'Create' }}
    </button>
    <a href="{{ url_for('admin.achievements_list') }}" class="ml-3 text-gray-600 hover:underline text-sm">Cancel</a>
</form>
{% endblock %}

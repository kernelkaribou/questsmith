{% extends "admin/base.html" %}
{% block title %}Log Activity{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-white mb-6">Log Activity</h1>

<form method="POST" class="bg-slate-800/50 border border-white/10 rounded-lg p-6 max-w-lg" x-data="activityForm()">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Quest</label>
        <select name="quest_id" required x-model="selectedQuest" @change="updateActivityTypes()"
                class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
            <option value="">Select a quest...</option>
            {% for q in quests %}
            <option value="{{ q.id }}" data-types='{{ q.activity_types_json }}'>
                {{ q.member.name }} - {{ q.theme_name }}{% if q.campaign %} ({{ q.campaign.name }}){% endif %}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Activity Type</label>
        <select name="activity_type_id" required x-model="selectedType"
                class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
            <option value="">Select activity type...</option>
            <template x-for="at in activityTypes" :key="at.id">
                <option :value="at.id" x-text="at.name + ' (' + at.unit + ')'"></option>
            </template>
        </select>
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Quantity</label>
        <input type="number" name="quantity" min="1" required
               class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
    </div>

    <template x-if="milestoneTypes.length > 0">
        <div class="mb-4 p-3 bg-amber-500/10 border border-amber-500/30 rounded-md">
            <label class="block text-sm font-medium text-amber-300 mb-2">Milestones completed?</label>
            <template x-for="mt in milestoneTypes" :key="mt.id">
                <label class="flex items-center gap-2 text-sm text-white/70 mb-1">
                    <input type="checkbox" name="milestones" :value="mt.id" class="rounded border-slate-500 bg-slate-700 text-amber-500 focus:ring-amber-500">
                    <span x-text="mt.name"></span>
                </label>
            </template>
        </div>
    </template>

    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Description (optional)</label>
        <input type="text" name="description" placeholder="e.g., Read chapters 5-8 of Harry Potter"
               class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Notes (optional)</label>
        <input type="text" name="notes" placeholder="Brief admin notes"
               class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
    </div>
    <button type="submit" class="bg-amber-500 text-slate-900 px-4 py-2 rounded hover:bg-amber-400 transition-colors font-medium">Log Activity</button>
    <a href="{{ url_for('admin.index') }}" class="ml-3 text-white/50 hover:text-white/80 text-sm transition-colors">Cancel</a>
</form>

<script>
function activityForm() {
    return {
        selectedQuest: '',
        selectedType: '',
        activityTypes: [],
        get regularTypes() {
            return this.activityTypes.filter(at => !at.is_milestone);
        },
        get milestoneTypes() {
            return this.activityTypes.filter(at => at.is_milestone);
        },
        updateActivityTypes() {
            const option = document.querySelector(`select[name="quest_id"] option[value="${this.selectedQuest}"]`);
            if (option) {
                this.activityTypes = JSON.parse(option.dataset.types || '[]');
            } else {
                this.activityTypes = [];
            }
            this.selectedType = '';
        }
    }
}
</script>
{% endblock %}

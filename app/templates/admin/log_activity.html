{% extends "admin/base.html" %}
{% block title %}Log Activity{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Log Activity</h1>

<form method="POST" class="bg-white rounded-lg shadow p-6 max-w-lg" x-data="activityForm()">
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Quest</label>
        <select name="quest_id" required x-model="selectedQuest" @change="updateActivityTypes()"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Select a quest...</option>
            {% for q in quests %}
            <option value="{{ q.id }}" data-types='{{ q.activity_types_json }}'>
                {{ q.member.name }} - {{ q.theme_name }} ({{ q.journey.name }})
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Activity Type</label>
        <select name="activity_type_id" required x-model="selectedType"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Select activity type...</option>
            <template x-for="at in activityTypes" :key="at.id">
                <option :value="at.id" x-text="at.name + ' (' + at.unit + ')'"></option>
            </template>
        </select>
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
        <input type="number" name="quantity" min="1" required
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
        <input type="text" name="description" placeholder="e.g., Read chapters 5-8 of Harry Potter"
               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Log Activity</button>
    <a href="{{ url_for('admin.index') }}" class="ml-3 text-gray-600 hover:underline text-sm">Cancel</a>
</form>

<script>
function activityForm() {
    return {
        selectedQuest: '',
        selectedType: '',
        activityTypes: [],
        updateActivityTypes() {
            const option = document.querySelector(`select[name="quest_id"] option[value="${this.selectedQuest}"]`);
            if (option) {
                this.activityTypes = JSON.parse(option.dataset.types || '[]');
            } else {
                this.activityTypes = [];
            }
            this.selectedType = '';
        }
    }
}
</script>
{% endblock %}

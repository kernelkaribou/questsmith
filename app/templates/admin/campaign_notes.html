{% extends "admin/base.html" %}
{% block title %}Notes: {{ campaign.name }}{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <div>
        <div class="flex items-center gap-2 mb-1">
            <span class="px-2 py-0.5 bg-indigo-500/20 text-indigo-300 text-xs font-bold rounded uppercase tracking-wide">Notes</span>
            <h1 class="text-2xl font-bold text-white">{{ campaign.name }}</h1>
        </div>
        <p class="text-white/60 text-sm">Supports Markdown formatting</p>
    </div>
    <a href="{{ url_for('admin.campaign_detail', campaign_id=campaign.id) }}" class="text-white/50 text-sm hover:text-white/80 transition-colors">Back</a>
</div>

<form method="POST" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <textarea name="notes" rows="20"
        class="w-full px-4 py-3 bg-slate-800/50 border border-white/10 rounded-lg text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500 font-mono resize-y"
        placeholder="Write your campaign notes here... Markdown is supported.">{{ campaign.notes or '' }}</textarea>
    <div class="flex gap-3">
        <button type="submit" class="bg-amber-500 text-slate-900 px-4 py-2 rounded text-sm font-medium hover:bg-amber-400 transition-colors">Save Notes</button>
        <a href="{{ url_for('admin.campaign_detail', campaign_id=campaign.id) }}" class="bg-slate-700 text-white/80 px-4 py-2 rounded text-sm hover:bg-slate-600 transition-colors">Cancel</a>
    </div>
</form>
{% endblock %}

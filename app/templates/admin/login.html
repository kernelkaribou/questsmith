<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Readers Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-80">
        <h1 class="text-2xl font-bold text-center text-indigo-700 mb-6">Admin Access</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <p class="text-red-600 text-sm text-center mb-4">{{ messages[0] }}</p>
        {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('admin.login') }}">
            <label class="block text-sm font-medium text-gray-700 mb-2">Enter PIN</label>
            <input type="password" name="pin" maxlength="10" autofocus
                   class="w-full px-4 py-2 border border-gray-300 rounded-md text-center text-2xl tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500"
                   inputmode="numeric" pattern="[0-9]*">
            <button type="submit"
                    class="w-full mt-4 bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">
                Unlock
            </button>
        </form>
    </div>
</body>
</html>

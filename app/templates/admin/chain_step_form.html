{% extends "admin/base.html" %}
{% block title %}{{ "Edit" if step else "New" }} Chain Step{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-white mb-2">{{ "Edit" if step else "Add" }} Step</h1>
    <p class="text-white/60 mb-6">Chain: {{ chain.name }}</p>

    <form method="POST" class="bg-slate-800/50 border border-white/10 rounded-lg p-6 space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
            <label class="block text-sm font-medium text-white/70">Step Name</label>
            <input type="text" name="name" value="{{ step.name if step else '' }}" required
                   placeholder="e.g. Talk to the village elder"
                   class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-white/70">Description (optional)</label>
            <textarea name="description" rows="2" placeholder="What must be done to complete this step?"
                      class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">{{ step.description if step else '' }}</textarea>
        </div>
        {% if step %}
        <div>
            <label class="block text-sm font-medium text-white/70">Order</label>
            <input type="number" name="chain_order" value="{{ step.chain_order }}" min="1"
                   class="mt-1 block w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
        </div>
        {% endif %}
        <div class="flex items-center gap-3">
            <button type="submit" class="px-4 py-2 bg-amber-500 text-slate-900 rounded-md hover:bg-amber-400 transition-colors font-medium">Save</button>
            <a href="{{ url_for('admin.chain_detail', chain_id=chain.id) }}"
               class="text-sm text-white/50 hover:text-white/80 transition-colors">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

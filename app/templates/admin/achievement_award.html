{% extends "admin/base.html" %}
{% block title %}Award Achievement{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-white mb-6">Award: {{ achievement.name }}</h1>

<form method="POST" class="bg-slate-800/50 border border-white/10 rounded-lg p-6 max-w-lg">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <p class="text-white/60 mb-4">{{ achievement.description or '' }}</p>
    <div class="mb-4">
        <label class="block text-sm font-medium text-white/70 mb-1">Award to Member</label>
        <select name="member_id" required
                class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500">
            {% for m in members %}
            <option value="{{ m.id }}">{{ m.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="bg-amber-500 text-slate-900 px-4 py-2 rounded hover:bg-amber-400 transition-colors font-medium">Award</button>
    <a href="{{ url_for('admin.achievements_list') }}" class="ml-3 text-white/50 hover:text-white/80 text-sm transition-colors">Cancel</a>
</form>
{% endblock %}

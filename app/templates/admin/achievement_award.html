{% extends "admin/base.html" %}
{% block title %}Award Achievement{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">Award: {{ achievement.name }}</h1>

<form method="POST" class="bg-white rounded-lg shadow p-6 max-w-lg">
    <p class="text-gray-600 mb-4">{{ achievement.description or '' }}</p>
    <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Award to Member</label>
        <select name="member_id" required
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            {% for m in members %}
            <option value="{{ m.id }}">{{ m.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Award</button>
    <a href="{{ url_for('admin.achievements_list') }}" class="ml-3 text-gray-600 hover:underline text-sm">Cancel</a>
</form>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Readers Quest{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --color-primary: {{ color_primary|default('#4F46E5') }};
            --color-secondary: {{ color_secondary|default('#818CF8') }};
        }
        .bg-theme-primary { background-color: var(--color-primary); }
        .bg-theme-secondary { background-color: var(--color-secondary); }
        .text-theme-primary { color: var(--color-primary); }
        .text-theme-secondary { color: var(--color-secondary); }
        .border-theme-primary { border-color: var(--color-primary); }
        .ring-theme-primary { --tw-ring-color: var(--color-primary); }
        .progress-fill {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            transition: width 0.5s ease;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    {% block body %}{% endblock %}

    <!-- Global Admin Floating Button -->
    {% set is_admin = session.get('admin', False) %}
    {% if is_admin %}
    <div x-data="{ open: false }" class="fixed bottom-4 right-4 z-50">
        <div x-show="open" x-cloak @click.away="open = false"
             class="absolute bottom-14 right-0 bg-white rounded-lg shadow-xl border p-2 w-40 space-y-1">
            <a href="{{ url_for('admin.index') }}" class="block px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 rounded">Admin Dashboard</a>
            <a href="{{ url_for('admin.logout') }}" class="block px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded">Lock</a>
        </div>
        <button @click="open = !open"
                class="w-12 h-12 bg-indigo-600 text-white rounded-full shadow-lg flex items-center justify-center hover:bg-indigo-700 transition-colors"
                title="Admin Menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
    </div>
    {% else %}
    <a href="{{ url_for('admin.login') }}"
       class="fixed bottom-4 right-4 z-50 w-10 h-10 bg-gray-300 text-gray-600 rounded-full shadow flex items-center justify-center hover:bg-gray-400 transition-colors opacity-60 hover:opacity-100"
       title="Admin Login">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    </a>
    {% endif %}
</body>
</html>
